  <text x="1408" y="525" font-size="22" font-weight="800" fill="#0A0A05">从工具到平台</text>
  <text x="1408" y="570" font-size="19" font-weight="600" fill="#0A0A05">• 多品牌工作区</text>
  <text x="1408" y="608" font-size="19" font-weight="600" fill="#0A0A05">• 版本历史与审批</text>
  <text x="1408" y="646" font-size="19" font-weight="600" fill="#0A0A05">• API / 自动化接入</text>
  <text x="1408" y="684" font-size="19" font-weight="600" fill="#0A0A05">• 质量评分报表</text>
  <text x="1408" y="722" font-size="19" font-weight="600" fill="#0A0A05">• 付费团队版</text>
  <rect x="1408" y="770" width="112" height="36" rx="18" fill="#FFFFFF" stroke="#2F2E25" stroke-width="2"/>
  <text x="1432" y="795" font-size="18" font-weight="800" fill="#0A0A05">Scale</text>

  <rect x="70" y="900" width="460" height="145" rx="12" fill="#EEFA79" stroke="#2F2E25" stroke-width="2"/>
  <text x="100" y="938" font-size="23" font-weight="800" fill="#0A0A05">North Star</text>
  <text x="100" y="976" font-size="21" font-weight="700" fill="#0A0A05">把“普通中文/英文 brief”稳定转成</text>
  <text x="100" y="1002" font-size="19" font-weight="700" fill="#0A0A05">香港消费者觉得自然、可信、</text>
  <text x="100" y="1026" font-size="19" font-weight="700" fill="#0A0A05">愿意互动的社媒内容。</text>

  <rect x="570" y="900" width="485" height="145" rx="12" fill="#FFFFFF" stroke="#2F2E25" stroke-width="2"/>
  <text x="600" y="938" font-size="23" font-weight="800" fill="#0A0A05">Key Metrics</text>
  <text x="600" y="976" font-size="20" font-weight="700" fill="#0A0A05">生成成功率 · 首次可用率 · 香港语感 4/5+</text>
  <text x="600" y="1008" font-size="19" font-weight="700" fill="#0A0A05">生成耗时 · 人工改动率 · 复制/导出率</text>

  <rect x="1095" y="900" width="510" height="145" rx="12" fill="#FFFFFF" stroke="#2F2E25" stroke-width="2"/>
  <text x="1125" y="938" font-size="23" font-weight="800" fill="#0A0A05">Critical Decision</text>
  <text x="1125" y="976" font-size="20" font-weight="700" fill="#0A0A05">是否引入异步生成 / 自托管粤语模型，</text>
  <text x="1125" y="1006" font-size="19" font-weight="700" fill="#0A0A05">决定能否稳定使用 CantoneseLLMChat</text>
  <text x="1125" y="1032" font-size="19" font-weight="700" fill="#0A0A05">作为产品主引擎。</text>
