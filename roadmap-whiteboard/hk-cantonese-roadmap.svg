  <text x="1078" y="570" font-size="19" font-weight="600" fill="#0A0A05">• 内容日历批量生成</text>
  <text x="1078" y="608" font-size="19" font-weight="600" fill="#0A0A05">• 飞书紫色修订模式</text>
  <text x="1078" y="646" font-size="19" font-weight="600" fill="#0A0A05">• KOL brief 一键改写</text>
  <text x="1078" y="684" font-size="19" font-weight="600" fill="#0A0A05">• 街坊留言模拟器增强</text>
  <text x="1078" y="722" font-size="19" font-weight="600" fill="#0A0A05">• 审核意见导出</text>
  <rect x="1078" y="770" width="150" height="36" rx="18" fill="#FFFFFF" stroke="#2F2E25" stroke-width="2"/>
  <text x="1106" y="795" font-size="18" font-weight="800" fill="#0A0A05">Workflow</text>

  <rect x="1380" y="410" width="240" height="430" rx="12" fill="#FFFFFF" stroke="#2F2E25" stroke-width="2"/>
  <rect x="1380" y="410" width="240" height="72" rx="12" fill="#EEFA79" stroke="#2F2E25" stroke-width="2"/>
