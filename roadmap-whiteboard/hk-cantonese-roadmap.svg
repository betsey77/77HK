  <text x="748" y="608" font-size="19" font-weight="600" fill="#0A0A05">• Words.hk / 粤典参考层</text>
  <text x="748" y="646" font-size="19" font-weight="600" fill="#0A0A05">• 港英夹杂控制器优化</text>
  <text x="748" y="684" font-size="19" font-weight="600" fill="#0A0A05">• Shorts 粤语口播节奏</text>
  <text x="748" y="722" font-size="19" font-weight="600" fill="#0A0A05">• HK reviewer 打分样本</text>
  <rect x="748" y="770" width="156" height="36" rx="18" fill="#FFFFFF" stroke="#2F2E25" stroke-width="2"/>
  <text x="778" y="795" font-size="18" font-weight="800" fill="#0A0A05">Quality</text>

  <rect x="1050" y="410" width="290" height="430" rx="12" fill="#FFFFFF" stroke="#2F2E25" stroke-width="2"/>
  <rect x="1050" y="410" width="290" height="72" rx="12" fill="#EEFA79" stroke="#2F2E25" stroke-width="2"/>
