  <text x="418" y="525" font-size="22" font-weight="800" fill="#0A0A05">让生成稳定可预期</text>
  <text x="418" y="570" font-size="19" font-weight="600" fill="#0A0A05">• 异步任务与轮询结果</text>
  <text x="418" y="608" font-size="19" font-weight="600" fill="#0A0A05">• 模型超时状态可视化</text>
  <text x="418" y="646" font-size="19" font-weight="600" fill="#0A0A05">• 重试 / 取消 / 继续生成</text>
  <text x="418" y="684" font-size="19" font-weight="600" fill="#0A0A05">• 日志与错误原因展示</text>
  <text x="418" y="722" font-size="19" font-weight="600" fill="#0A0A05">• API key 安全治理</text>
