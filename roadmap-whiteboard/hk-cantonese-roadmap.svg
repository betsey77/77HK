  <text x="88" y="570" font-size="19" font-weight="600" fill="#0A0A05">• 三平台文案生成</text>
  <text x="88" y="608" font-size="19" font-weight="600" fill="#0A0A05">• 港味温度计与风险提示</text>
  <text x="88" y="646" font-size="17" font-weight="600" fill="#0A0A05">• CantoLLM 优先</text>
  <text x="88" y="684" font-size="17" font-weight="600" fill="#0A0A05">• DeepSeek 后备生成/审核</text>
  <text x="88" y="722" font-size="19" font-weight="600" fill="#0A0A05">• 规则兜底避免空白</text>
  <rect x="88" y="770" width="118" height="36" rx="18" fill="#0A0A05"/>
  <text x="113" y="795" font-size="18" font-weight="800" fill="#FFFFFF">LIVE</text>

  <rect x="390" y="410" width="290" height="430" rx="12" fill="#FFFFFF" stroke="#2F2E25" stroke-width="2"/>
